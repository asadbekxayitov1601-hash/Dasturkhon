<head>

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-Y5K6MCRRKP');

  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/src/app/assets/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dasturkhon - Discover, organize, and cook traditional and modern Uzbek recipes. Manage your pantry, create smart shopping lists, and share recipes with the community." />
  <title>Dasturkhon</title>
  <!-- Telegram Mini App SDK: provides window.Telegram.WebApp when opened in Telegram. -->
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Font pairing: Playfair Display (display headings) + Inter (body) — editorial/food aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" />
  </noscript>
  <script>
    // Initialize a default Trusted Types policy to allow third-party scripts (like Telegram WebApp)
    // that are not Trusted Types compliant to safely assign HTML/Script strings.
    if (window.trustedTypes && window.trustedTypes.createPolicy && !window.trustedTypes.defaultPolicy) {
      try {
        window.trustedTypes.createPolicy('default', {
          createHTML: (string) => string,
          createScript: (string) => string,
          createScriptURL: (string) => string,
        });
      } catch (e) {
        console.error('Failed to create default Trusted Types policy:', e);
      }
    }

    // Apply saved theme before paint to avoid a flash.
    try { if (localStorage.getItem('dasturxon-theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
